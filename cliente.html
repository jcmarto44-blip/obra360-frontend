<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Portal Privado Cliente</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #f3f4f6;">

  <!-- HEADER -->
  <nav class="navbar navbar-dark bg-primary shadow-lg py-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">

      <div class="d-flex align-items-center">
        <img src="Captura de pantalla 2026-05-26 114834.jpg"
             style="height:80px;background:white;padding:5px;border-radius:10px;margin-right:20px;">
        <div>
          <h2 class="text-white fw-bold m-0">Portal Privado del Cliente</h2>
          <p class="text-white m-0">Gestión Integral de Obra</p>
        </div>
      </div>

      <button class="btn btn-danger fw-bold px-4" onclick="window.location.href='index.html'">
        Salir
      </button>

      <img src="elasticcomputefarm-supermarket-949913_1920.jpg"
           style="height:70px;width:140px;object-fit:cover;border-radius:10px;border:3px solid white;">
    </div>
  </nav>

  <!-- BIENVENIDA -->
  <div class="container mt-4">
    <div class="alert alert-success shadow">
      <h4 class="fw-bold">Bienvenido al Panel del Proyecto</h4>
      <p class="m-0">Accede a reportes, Power BI y modelo 3D.</p>
    </div>
  </div>

  <!-- TARJETAS -->
  <div class="container mt-4">
    <div class="row g-4">

      <!-- SUBIR INFORME -->
      <div class="col-md-3">
        <div class="card shadow-lg border-0 rounded-4 h-100">
          <div class="card-body text-center p-4">
            <h4 class="text-primary fw-bold mb-4">Subir Informe</h4>
            <input type="file" class="form-control mb-3">
            <button class="btn btn-success w-100 fw-bold">Subir Archivo</button>
          </div>
        </div>
      </div>

      <!-- ARCHIVOS -->
      <div class="col-md-3">
        <div class="card shadow-lg border-0 rounded-4 h-100">
          <div class="card-body text-center p-4">
            <h4 class="text-primary fw-bold mb-4">Archivos</h4>
            <p class="fw-bold">Informe_Obra.csv</p>
          </div>
        </div>
      </div>

      <!-- POWER BI -->
      <div class="col-md-3">
        <div class="card shadow-lg border-0 rounded-4 h-100">
          <div class="card-body text-center p-4">
            <h4 class="text-primary fw-bold mb-4">Power BI</h4>
            <a class="btn btn-warning fw-bold w-100"
               target="_blank"
               href="https://app.powerbi.com/view?r=eyJrIjoiOGY3NGUxM2ItZWEyMi00ZGNkLThlMTItNmU2ZWYzMWE0OWMyIiwidCI6IjE1ZGEzZGM4LWRkODUtNDZiYi05NGU3LWI1YTNjMzE3ZTBhOSJ9">
              Ver Reporte
            </a>
          </div>
        </div>
      </div>

      <!-- MODELO 3D -->
      <div class="col-md-3">
        <div class="card shadow-lg border-0 rounded-4 h-100">
          <div class="card-body text-center p-4">

            <h4 class="text-primary fw-bold mb-4">Modelo 3D</h4>

            <p>Visualización BIM del modelo en Revit.</p>

            <button class="btn btn-primary fw-bold w-100"
                    onclick="openModal()">
              Seleccionar Proyecto
            </button>

          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center p-4 mt-5">
    <p class="m-0">CAASA — Plataforma Obra 360</p>
  </footer>

  <!-- MODAL AZUL TRANSLÚCIDO -->
  <div id="projectModal"
       style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
       background:rgba(20,80,160,0.45);
       backdrop-filter: blur(6px);
       justify-content:center; align-items:center;">

    <div style="background:#ffffff; padding:26px; border-radius:14px; width:360px; text-align:center;">

      <h5 style="color:#0d6efd; font-weight:600; margin-bottom:15px;">
        Abrir Modelo 3D
      </h5>

      <input type="text"
             id="projectName"
             class="form-control mb-3"
             placeholder="Escribe el nombre del proyecto">

      <p id="confirmText" style="font-weight:600; color:#333;"></p>

      <!-- ACEPTAR -->
      <button class="btn btn-success w-100 mb-2 fw-bold" onclick="confirmOpen()">
        Aceptar
      </button>

      <!-- SALIR -->
      <button class="btn btn-outline-primary w-100" onclick="closeModal()">
        Salir
      </button>

    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    function openModal() {
      document.getElementById("projectModal").style.display = "flex";
      document.getElementById("projectName").value = "";
      document.getElementById("confirmText").innerText = "";
    }

    function closeModal() {
      document.getElementById("projectModal").style.display = "none";
    }

    document.addEventListener("input", function(e) {
      if (e.target.id === "projectName") {
        const value = e.target.value;
        document.getElementById("confirmText").innerText =
          value ? `¿Abrir proyecto: ${value}?` : "";
      }
    });

    function confirmOpen() {
      const project = document.getElementById("projectName").value;

      if (!project) {
        alert("Escribe el nombre del proyecto");
        return;
      }

      window.location.href = `revitopen://${project}`;
    }
  </script>

</body>
</html>
