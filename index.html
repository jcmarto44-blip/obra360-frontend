<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Análisis y Reportes de Obra 360</title>
</head>
<body>
  <h1>Análisis y Reportes de Obra 360</h1>

  <form id="formSubir">
    <input type="file" name="file" />
    <button type="button" onclick="subirInforme()">Subir Informe</button>
  </form>

  <script>
    async function subirInforme() {
      const formData = new FormData(document.getElementById("formSubir"));
      try {
        const response = await fetch("https://analisis-reportes-obra-360.onrender.com/subir", {
          method: "POST",
          body: formData
        });
        const data = await response.json();
        alert("Informe subido correctamente");
      } catch (error) {
        alert("Error al subir el informe");
      }
    }
  </script>
</body>
</html>
