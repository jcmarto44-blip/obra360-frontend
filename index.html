</head>
<body>

  <!-- Encabezado -->
  <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="Captura de pantalla 2026-05-26 114834.jpg" alt="CAASA" width="40" height="40" class="d-inline-block align-text-top">
        Análisis y Reportes de Obra 360
      </a>
    </div>
  </nav>

  <!-- Carrusel -->
  <div id="carouselObra360" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="nikguy-construction-site-2733678_1920.jpg" class="d-block w-100" alt="CEDIS">
      </div>
      <div class="carousel-item">
        <img src="elasticcomputefarm-supermarket-949913_1920.jpg" class="d-block w-100" alt="Supermercado">
      </div>
      <div class="carousel-item">
        <img src="marcinjozwiak-production-4408573_1920.jpg" class="d-block w-100" alt="Producción">

      <div class="carousel-item">

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselObra360" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselObra360" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- Formulario Subir Informe -->
  <div class="container mt-4">
    <h2>Subir Informe</h2>

    <form id="formSubir">
      <input type="file" name="file" class="form-control mb-2" />
      <button type="button" class="btn btn-success" onclick="subirInforme()">
        Subir Informe
      </button>
    </form>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center p-3 mt-4">

    </p>

    <p>
      CAASA – Análisis y Reportes de Obra 360
    </p>
  </footer>

  <!-- Script subir informe -->
  <script>

    async function subirInforme() {

      const formData = new FormData(document.getElementById("formSubir"));

      try {

        const response = await fetch(
          "https://analisis-reportes-obra-360.onrender.com/subir",
          {
            method: "POST",
            body: formData
          }
        );

        const data = await response.json();

        alert("Informe subido correctamente");

      } catch (error) {

        alert("Error al subir el informe");

      }

    }

  </script>
