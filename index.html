<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Análisis y Reportes de Obra 360</title>
</head>
<body>
  <h1>Análisis y Reportes de Obra 360</h1>

  <button onclick="subirInforme()">Subir Informe</button>
  <button onclick="verArchivos()">Ver Archivos</button>
  <button onclick="verReporte()">Ver Reporte</button>
  <button onclick="verModelo()">Ver Modelo BIM</button>

  <pre id="resultado"></pre>

  <script>
    async function subirInforme() {
      alert("Aquí irá la función para subir archivo a la API");
    }

    async function verArchivos() {
      const res = await fetch("https://analisis-reportes-obra-360.onrender.com/archivos");
      const data = await res.json();
      document.getElementById("resultado").textContent = JSON.stringify(data, null, 2);
    }

    async function verReporte() {
      const res = await fetch("https://analisis-reportes-obra-360.onrender.com/reporte");
      const data = await res.json();
      document.getElementById("resultado").textContent = JSON.stringify(data, null, 2);
    }

    async function verModelo() {
      const res = await fetch("https://analisis-reportes-obra-360.onrender.com/modelo");
      const data = await res.json();
      document.getElementById("resultado").textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
